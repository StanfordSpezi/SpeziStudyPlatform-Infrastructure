volumes:
  server_db_data:
  keycloak_db_data:

services:
  server-db:
    image: postgres:18-alpine
    volumes:
      - server_db_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${DATABASE_USERNAME}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}
    ports:
      - '5432:5432'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USERNAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  keycloak-db:
    image: postgres:18-alpine
    volumes:
      - keycloak_db_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${KEYCLOAK_DB_USERNAME}
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
      POSTGRES_DB: ${KEYCLOAK_DB_NAME}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${KEYCLOAK_DB_USERNAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:26.6.1
    command: start-dev --health-enabled=true
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USERNAME}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/${KEYCLOAK_DB_NAME}
      KC_DB_USERNAME: ${KEYCLOAK_DB_USERNAME}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
    depends_on:
      keycloak-db:
        condition: service_healthy
    ports:
      - '8180:8080'
    healthcheck:
      test:
        - CMD-SHELL
        - |
          exec 3<>/dev/tcp/localhost/9000 &&
          echo -e 'GET /health/ready HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n' >&3 &&
          head -1 <&3 | grep -q '200 OK'
      start_period: 30s
      interval: 10s
      timeout: 5s
      retries: 12

  keycloak-config-cli:
    image: quay.io/adorsys/keycloak-config-cli:6.5.0-26
    environment:
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_USER: ${KEYCLOAK_ADMIN_USERNAME}
      KEYCLOAK_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KEYCLOAK_AVAILABILITYCHECK_ENABLED: "true"
      KEYCLOAK_AVAILABILITYCHECK_TIMEOUT: "120s"
      IMPORT_MANAGED_REALM: full
      IMPORT_FILES_LOCATIONS: /config/*
      IMPORT_VAR_SUBSTITUTION_ENABLED: "true"
      WEB_URL: "http://localhost:3000"
      SERVER_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET}
    volumes:
      - ../infrastructure/base/keycloak/realm/00-realm.json:/config/00-realm.json:ro
      - ./keycloak/docker-overrides.json:/config/10-overrides.json:ro
    depends_on:
      keycloak:
        condition: service_healthy
    restart: "no"

  server:
    image: ghcr.io/stanfordspezi/spezistudyplatform-server:main
    command: ["serve", "--env", "production", "--hostname", "0.0.0.0", "--port", "8080"]
    environment:
      APP_ENVIRONMENT: ${APP_ENVIRONMENT}
      DATABASE_HOST: server-db
      DATABASE_NAME: ${DATABASE_NAME}
      DATABASE_USERNAME: ${DATABASE_USERNAME}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: ${KEYCLOAK_REALM}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET}
      KEYCLOAK_RESEARCHER_ROLE: ${KEYCLOAK_RESEARCHER_ROLE}
      KEYCLOAK_PARTICIPANT_ROLE: ${KEYCLOAK_PARTICIPANT_ROLE}
    depends_on:
      server-db:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    ports:
      - '8080:8080'

  server-migrate:
    image: ghcr.io/stanfordspezi/spezistudyplatform-server:main
    command: ["migrate", "--yes"]
    environment:
      APP_ENVIRONMENT: ${APP_ENVIRONMENT}
      DATABASE_HOST: server-db
      DATABASE_NAME: ${DATABASE_NAME}
      DATABASE_USERNAME: ${DATABASE_USERNAME}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: ${KEYCLOAK_REALM}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET}
      KEYCLOAK_RESEARCHER_ROLE: ${KEYCLOAK_RESEARCHER_ROLE}
      KEYCLOAK_PARTICIPANT_ROLE: ${KEYCLOAK_PARTICIPANT_ROLE}
    depends_on:
      server-db:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    profiles:
      - migrate

  web:
    image: ghcr.io/stanfordspezi/spezistudyplatform-web:main
    environment:
      VITE_API_BASE_PATH: ${VITE_API_BASE_PATH}
      VITE_KEYCLOAK_URL: ${VITE_KEYCLOAK_URL}
      VITE_KEYCLOAK_REALM: ${VITE_KEYCLOAK_REALM}
      VITE_KEYCLOAK_CLIENT_ID: ${VITE_KEYCLOAK_CLIENT_ID}
    depends_on:
      - server
    ports:
      - '3000:8080'
