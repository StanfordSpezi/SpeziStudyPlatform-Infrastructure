apiVersion: apps/v1
kind: Deployment
metadata:
  name: vault
  namespace: vault
  labels:
    app: vault
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vault
  template:
    metadata:
      labels:
        app: vault
    spec:
      containers:
        - name: vault
          image: hashicorp/vault:1.15
          args:
            - vault
            - server
            - -dev
            - -dev-root-token-id=dev-only-token
            - -dev-listen-address=0.0.0.0:8200
          ports:
            - containerPort: 8200
              name: vault
          env:
            - name: VAULT_DEV_ROOT_TOKEN_ID
              value: dev-only-token
          resources:
            limits:
              memory: 256Mi
              cpu: 250m
            requests:
              memory: 64Mi
              cpu: 50m
---
apiVersion: v1
kind: Service
metadata:
  name: vault
  namespace: vault
spec:
  selector:
    app: vault
  ports:
    - port: 8200
      targetPort: 8200
      name: vault
