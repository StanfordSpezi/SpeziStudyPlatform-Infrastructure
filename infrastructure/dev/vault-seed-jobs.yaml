apiVersion: batch/v1
kind: Job
metadata:
  name: vault-server-secret-setup
  namespace: vault
spec:
  backoffLimit: 5
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: vault-setup
          image: hashicorp/vault:1.15
          env:
            - name: VAULT_ADDR
              value: http://vault.vault.svc.cluster.local:8200
            - name: VAULT_TOKEN
              value: dev-only-token
          command:
            - sh
            - -c
            - |
              until vault status >/dev/null 2>&1; do echo "Waiting for Vault..."; sleep 2; done
              vault kv get secret/spezistudyplatform-server >/dev/null 2>&1 || \
                vault kv put secret/spezistudyplatform-server OAUTH_CLIENT_SECRET=change-me-in-production
---
