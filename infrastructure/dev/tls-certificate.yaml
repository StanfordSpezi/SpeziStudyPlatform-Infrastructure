apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: spezistudyplatform-main-tls-cert
  namespace: spezistudyplatform
spec:
  commonName: localhost
  secretName: spezistudyplatform-main-tls-secret
  issuerRef:
    name: selfsigned-issuer
    kind: ClusterIssuer
  dnsNames:
    - localhost
