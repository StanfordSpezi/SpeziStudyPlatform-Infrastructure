apiVersion: batch/v1
kind: Job
metadata:
  name: keycloak-config-cli
  namespace: spezistudyplatform
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: keycloak-config-cli
    spec:
      restartPolicy: Never
      containers:
        - name: keycloak-config-cli
          image: quay.io/adorsys/keycloak-config-cli:6.5.0-26
          env:
            - name: KEYCLOAK_URL
              value: http://keycloak.spezistudyplatform.svc.cluster.local/auth
            - name: KEYCLOAK_USER
              valueFrom:
                secretKeyRef:
                  name: keycloak-admin-secret
                  key: username
            - name: KEYCLOAK_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak-admin-secret
                  key: password
            - name: KEYCLOAK_AVAILABILITYCHECK_ENABLED
              value: "true"
            - name: KEYCLOAK_AVAILABILITYCHECK_TIMEOUT
              value: "120s"
            - name: IMPORT_FILES_LOCATIONS
              value: /config/*
            - name: IMPORT_VAR_SUBSTITUTION_ENABLED
              value: "true"
            - name: SERVER_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: spezistudyplatform-server-secret
                  key: KEYCLOAK_CLIENT_SECRET
          volumeMounts:
            - name: realm-config
              mountPath: /config
              readOnly: true
      volumes:
        - name: realm-config
          configMap:
            name: keycloak-realm-config
