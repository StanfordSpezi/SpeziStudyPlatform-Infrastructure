  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: spezistudyplatform-server
      ports:
        - protocol: TCP
          port: 8080
---
# CNPG instance manager pods need the K8s API for leader election and status updates.
# CIDRs are GKE-specific and sourced from terraform:
#   - 10.8.0.1/32: kubernetes.default service IP (first usable in services range
#     terraform/networking.tf -> ip_cidr_range = "10.8.0.0/20")
#   - 172.16.0.0/28: GKE control plane endpoint
#     (terraform/gke.tf -> master_ipv4_cidr_block = "172.16.0.0/28")
# Update both blocks if the terraform values change.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-cnpg-to-k8s-api
  namespace: spezistudyplatform
spec:
  podSelector:
    matchExpressions:
      - key: cnpg.io/cluster
        operator: Exists
  policyTypes:
    - Egress
  egress:
    - to:
        - ipBlock:
            cidr: 10.8.0.1/32
        - ipBlock:
            cidr: 172.16.0.0/28
      ports:
        - protocol: TCP
          port: 443
---
# CNPG operator (cnpg-system ns) reaches instance pods for status (8000) and metrics (9187)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-cnpg-operator-to-instances
  namespace: spezistudyplatform
spec:
  podSelector:
    matchExpressions:
      - key: cnpg.io/cluster
        operator: Exists
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: cnpg-system
      ports:
        - protocol: TCP
          port: 8000
        - protocol: TCP
          port: 9187
---
# Egress rules (counterparts to ingress allows above)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-server-to-db-egress
  namespace: spezistudyplatform
spec:
  podSelector:
    matchLabels:
      app: spezistudyplatform-server
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              cnpg.io/cluster: spezistudyplatform-db
      ports:
        - protocol: TCP
          port: 5432
---
