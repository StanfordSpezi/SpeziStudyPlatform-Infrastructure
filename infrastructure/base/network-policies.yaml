apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-traefik-egress
  namespace: spezistudyplatform
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: traefik
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchExpressions:
              - key: app
                operator: In
                values:
                  - spezistudyplatform-server
                  - spezistudyplatform-web
                  - keycloak
      ports:
        - protocol: TCP
          port: 8080
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: argocd
          podSelector:
            matchLabels:
              app.kubernetes.io/name: argocd-server
      ports:
        - protocol: TCP
          port: 8080
    # K8s API egress (Traefik watches IngressRoute CRDs). CIDRs documented on allow-cnpg-to-k8s-api above.
    - to:
        - ipBlock:
            cidr: 10.8.0.1/32
        - ipBlock:
            cidr: 172.16.0.0/28
      ports:
        - protocol: TCP
          port: 443
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
