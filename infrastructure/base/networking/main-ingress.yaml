apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: spezistudyplatform-ingress
  namespace: spezistudyplatform
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`DOMAIN_PLACEHOLDER`)
      priority: 1
      services:
        - name: spezistudyplatform-web-service
          port: 80
      middlewares:
        - name: security-headers
    - kind: Rule
      match: Host(`DOMAIN_PLACEHOLDER`) && PathPrefix(`/api`)
      priority: 2
      services:
        - name: spezistudyplatform-server-service
          port: 8080
      middlewares:
        - name: security-headers
  tls:
    secretName: spezistudyplatform-main-tls-secret
