apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-tanka-cmp
  namespace: argocd
  annotations:
    app.kubernetes.io/part-of: argocd
data:
  plugin.yaml: |
    apiVersion: argoproj.io/v1alpha1
    kind: ConfigManagementPlugin
    metadata:
      name: tanka
    spec:
      init:
        command: [jb, install]
      generate:
        command: [sh, -c]
        # Filter out OpenTelemetry tracing data that corrupts YAML parsing and add debugging
        args: ["echo 'ARGOCD_ENV_COMPONENT='$ARGOCD_ENV_COMPONENT >&2 && echo 'ARGOCD_ENV_ENVIRONMENT='$ARGOCD_ENV_ENVIRONMENT >&2 && echo 'ARGOCD_ENV_LOCAL_IP='$ARGOCD_ENV_LOCAL_IP >&2 && echo 'Starting Tanka generation for environment: '$ARGOCD_ENV_ENVIRONMENT' component: '$ARGOCD_ENV_COMPONENT >&2 && LOCAL_IP_TLA=$(if [ -n \"$ARGOCD_ENV_LOCAL_IP\" ]; then echo \"--tla-str localIP=$ARGOCD_ENV_LOCAL_IP\"; fi) && VAULT_SERVER_TLA=$(if [ -n \"$ARGOCD_ENV_VAULT_SERVER\" ]; then echo \"--tla-str vaultServer=$ARGOCD_ENV_VAULT_SERVER\"; fi) && VAULT_TOKEN_TLA=$(if [ -n \"$ARGOCD_ENV_VAULT_TOKEN\" ]; then echo \"--tla-str vaultToken=$ARGOCD_ENV_VAULT_TOKEN\"; fi) && OTEL_SDK_DISABLED=true OTEL_TRACES_EXPORTER=none OTEL_METRICS_EXPORTER=none OTEL_LOGS_EXPORTER=none /usr/local/bin/tk show --dangerous-allow-redirect environments/$ARGOCD_ENV_ENVIRONMENT --tla-str component=$ARGOCD_ENV_COMPONENT $LOCAL_IP_TLA $VAULT_SERVER_TLA $VAULT_TOKEN_TLA 2>/tmp/tanka-stderr-$ARGOCD_ENV_COMPONENT.log | tee /tmp/tanka-output-$ARGOCD_ENV_COMPONENT.log | grep -v '^map\\[.*\\]$' | grep -v 'traces export:' || (echo 'Tanka generation failed!' >&2; cat /tmp/tanka-stderr-$ARGOCD_ENV_COMPONENT.log >&2; exit 1)"]
      discover:
        fileName: "./jsonnetfile.json"
      allowConcurrency: true
      lockRepo: false
      parameters:
        static:
        - name: "server-side-apply"
          value: "true"
        - name: "force-apply"
          value: "true"