apiVersion: apps/v1
kind: Deployment
metadata:
  name: spezistudyplatform-web
  namespace: spezistudyplatform
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 0
  template:
    spec:
      containers:
        - name: spezistudyplatform-web-container
          image: ghcr.io/stanfordspezi/spezistudyplatform-web:main
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              memory: 128Mi
              cpu: 50m
            limits:
              memory: 1Gi
              cpu: 100m
