apiVersion: apps/v1
kind: Deployment
metadata:
  name: spezistudyplatform-server
  namespace: spezistudyplatform
spec:
  replicas: 1
  strategy:
    type: Recreate
  template:
    spec:
      initContainers:
        - name: spezistudyplatform-server-migrate
          image: ghcr.io/stanfordspezi/spezistudyplatform-server:main
      containers:
        - name: spezistudyplatform-server-container
          image: ghcr.io/stanfordspezi/spezistudyplatform-server:main
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
