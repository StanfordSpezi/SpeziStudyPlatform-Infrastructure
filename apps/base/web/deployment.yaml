apiVersion: apps/v1
kind: Deployment
metadata:
  name: spezistudyplatform-web
  namespace: spezistudyplatform
  labels:
    app: spezistudyplatform-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spezistudyplatform-web
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: spezistudyplatform-web
    spec:
      serviceAccountName: spezistudyplatform-web
      containers:
        - name: spezistudyplatform-web-container
          image: ghcr.io/stanfordspezi/spezistudyplatform-web:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          resources:
            requests:
              memory: 64Mi
              cpu: 25m
            limits:
              memory: 256Mi
              cpu: 100m
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 101
            capabilities:
              drop:
                - ALL
          envFrom:
            - configMapRef:
                name: spezistudyplatform-web-config
          startupProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 5
            failureThreshold: 12
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            periodSeconds: 15
