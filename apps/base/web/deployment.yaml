apiVersion: apps/v1
kind: Deployment
metadata:
  name: spezistudyplatform-web
  namespace: spezistudyplatform
  labels:
    app: spezistudyplatform-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spezistudyplatform-web
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: spezistudyplatform-web
    spec:
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      containers:
        - name: spezistudyplatform-web-container
          image: ghcr.io/stanfordspezi/spezistudyplatform-web:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          resources:
            requests:
              memory: 64Mi
              cpu: 25m
            limits:
              memory: 256Mi
              cpu: 100m
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 101
            capabilities:
              drop:
                - ALL
          envFrom:
            - configMapRef:
                name: spezistudyplatform-web-config
          env:
            - name: OAUTH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: spezistudyplatform-web-secret
                  key: OAUTH_CLIENT_SECRET
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
