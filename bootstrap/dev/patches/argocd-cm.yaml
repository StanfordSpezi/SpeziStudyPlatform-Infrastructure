apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cm
  namespace: argocd
data:
  url: https://localhost/argo
  oidc.config: |
    name: Keycloak
    issuer: https://localhost/auth/realms/spezistudyplatform
    clientId: argocd
    redirectURI: https://localhost/argo/auth/callback
    enablePKCEAuthentication: true
    insecure: true
    requestedScopes: ["openid", "profile", "email", "groups"]
    requestedIDTokenClaims:
      groups:
        essential: true
    cliClientId: argocd
