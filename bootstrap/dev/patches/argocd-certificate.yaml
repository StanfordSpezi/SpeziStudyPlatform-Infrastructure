apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: argocd-main-tls-cert
  namespace: argocd
spec:
  commonName: localhost
  issuerRef:
    name: selfsigned-issuer
  dnsNames:
    - localhost
