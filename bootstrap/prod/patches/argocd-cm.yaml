apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cm
  namespace: argocd
data:
  url: https://platform.spezi.stanford.edu/argo
  oidc.config: |
    name: Keycloak
    issuer: https://platform.spezi.stanford.edu/auth/realms/spezistudyplatform
    clientId: argocd
    redirectURI: https://platform.spezi.stanford.edu/argo/auth/callback
    enablePKCEAuthentication: true
    insecure: false
    requestedScopes: ["openid", "profile", "email", "groups"]
    requestedIDTokenClaims:
      groups:
        essential: true
    cliClientId: argocd
