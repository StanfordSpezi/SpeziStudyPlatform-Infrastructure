name: Smoke Test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  kind-smoke-test:
    name: KIND Smoke Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Install KIND
        run: |
          curl -sSLo ./kind https://kind.sigs.k8s.io/dl/latest/kind-linux-amd64
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind

      - name: Install Helm
        uses: azure/setup-helm@v5

      - name: Create KIND cluster
        run: kind create cluster --name spezi-study-platform --config tools/kind-config.yaml

      - name: Bootstrap ArgoCD and applications
        run: python3 tools/setup.py

      - name: Wait for ArgoCD Applications
        run: bash tools/smoke-test.sh
        env:
          SMOKE_TEST_TIMEOUT: "600"

      - name: Debug on failure
        if: failure()
        run: |
          echo "=== ArgoCD Applications ==="
          kubectl get applications -n argocd -o wide
          echo ""
          echo "=== All Pods ==="
          kubectl get pods -A
          echo ""
          echo "=== Events ==="
          kubectl get events -A --sort-by='.lastTimestamp' | tail -40
          echo ""
          echo "=== Keycloak Logs ==="
          kubectl logs -n spezistudyplatform -l app=keycloak --tail=80 || true
          echo ""
          echo "=== Server Init Container Logs ==="
          kubectl logs -n spezistudyplatform -l app=spezistudyplatform-server -c spezistudyplatform-server-migrate --tail=40 || true
