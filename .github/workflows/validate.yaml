name: Validate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  manifests:
    name: Validate Manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install kubeconform
        run: |
          curl -sSL https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz \
            | tar xz -C /usr/local/bin
      - name: Build and validate all overlays
        run: |
          for overlay in infrastructure/dev infrastructure/prod apps/dev apps/prod bootstrap/dev bootstrap/prod argocd-apps/dev argocd-apps/prod; do
            echo "=== $overlay ==="
            kubectl kustomize "$overlay" | kubeconform \
              -strict \
              -summary \
              -output text \
              -schema-location default \
              -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
              -skip CustomResourceDefinition
          done

  tofu-validate:
    name: Tofu Validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v6
      - name: Install OpenTofu
        uses: opentofu/setup-opentofu@v2
      - name: Check formatting
        run: tofu fmt -check -diff
      - name: Initialize
        run: tofu init -backend=false
      - name: Validate
        run: tofu validate

